services:
  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    expose:
      - "19099"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:19099/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "19098:80"
